# PDF Tools TUI - Preset Lote Massivo
# Para processar muitos arquivos rapidamente

PRESET_NAME="lote_massivo"
PRESET_DESC="Processamento rápido de muitos arquivos"

ocr:
  language: "por"
  quality: "low"
  deskew: false
  clean: false
  remove_background: false
  oversample: false
  force: true

conversion:
  image_dpi: 150
  jpeg_quality: 60
  compression: "high"

batch:
  parallel_jobs: 8
  stop_on_error: false
  create_subdirs: false
  naming_pattern: "{basename}_out.{ext}"
