# PDF Tools TUI - Preset Alta Qualidade
# Para documentos importantes com máxima qualidade

PRESET_NAME="alta_qualidade"
PRESET_DESC="Máxima qualidade para documentos importantes"

ocr:
  language: "por"
  quality: "high"
  deskew: true
  clean: true
  remove_background: true
  oversample: true
  force: true

conversion:
  pdf_to_txt_layout: true
  image_dpi: 600
  jpeg_quality: 100
  compression: "low"

extraction:
  preserve_layout: true
  extract_tables: true
  extract_images: true
  extract_metadata: true

batch:
  parallel_jobs: 1
  stop_on_error: true
  create_subdirs: true
