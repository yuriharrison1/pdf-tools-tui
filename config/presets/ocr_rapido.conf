# PDF Tools TUI - Preset OCR Rápido
# Para OCR rápido em documentos simples

PRESET_NAME="ocr_rapido"
PRESET_DESC="OCR rápido sem muita qualidade"

ocr:
  language: "por"
  quality: "low"
  deskew: false
  clean: false
  remove_background: false
  oversample: false
  force: true

conversion:
  image_dpi: 150
  jpeg_quality: 70

batch:
  parallel_jobs: 4
  create_subdirs: false
