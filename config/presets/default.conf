# PDF Tools TUI - Preset Padrão
# Configurações salvas para diferentes tipos de uso

# 📋 Nome do preset
PRESET_NAME="default"
PRESET_DESC="Configurações padrão para uso geral"

# 🎯 OCR Settings
ocr:
  language: "por"
  quality: "high"
  deskew: true
  clean: true
  remove_background: false
  oversample: false
  force: false

# 🔄 Conversion Settings
conversion:
  pdf_to_txt_layout: true
  pdf_to_docx_engine: "pandoc"
  image_dpi: 300
  jpeg_quality: 90
  compression: "medium"

# 📝 Extraction Settings
extraction:
  preserve_layout: true
  extract_tables: false
  extract_images: true
  extract_metadata: true

# 📦 Batch Settings
batch:
  parallel_jobs: 2
  stop_on_error: false
  create_subdirs: true
  naming_pattern: "{basename}_processed.{ext}"

# 🎨 Interface Settings
interface:
  theme: "default"
  show_preview: true
  color_enabled: true
  progress_style: "simple"
