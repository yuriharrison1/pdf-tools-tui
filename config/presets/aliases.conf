# PDF Tools TUI - Aliases personalizados
# Comandos curtos para operações frequentes

# Aliases do sistema
alias pdf-ocr='pdf-tools ocr'
alias pdf-forms='pdf-tools forms'
alias pdf-convert='pdf-tools convert'
alias pdf-info='pdfinfo'
alias pdf-text='pdftotext'

# Aliases personalizados
alias pdf-scan2txt='ocrmypdf --language por --deskew --clean'
alias pdf-compress='gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.4 -dPDFSETTINGS=/ebook -dNOPAUSE -dQUIET -dBATCH'
alias pdf-merge='gs -q -dNOPAUSE -dBATCH -sDEVICE=pdfwrite -sOutputFile=merged.pdf'

# Aliases para qualidade
alias pdf-high='ocrmypdf --language por --deskew --clean --oversample 600 --remove-background'
alias pdf-fast='ocrmypdf --language por --skip-text'

# Aliases para extração
alias pdf-images='pdfimages -all'
alias pdf-table='tabula'
alias pdf-grep='pdfgrep -i'
