# PDF Tools TUI - Configurações Principais
# Este arquivo é gerado automaticamente pelo instalador

# ⚙️ Configurações Gerais
LANGUAGE="por"                          # Idioma padrão para OCR (por/eng/spa)
WORKSPACE_DIR="$HOME/Documents/PDF_Tools" # Diretório de trabalho principal
DEFAULT_OUTPUT_DIR="$WORKSPACE_DIR/output" # Diretório padrão para saídas
LOG_LEVEL="INFO"                         # Nível de log (DEBUG/INFO/WARNING/ERROR)
AUTO_CLEAN_TEMP="true"                   # Limpar arquivos temporários automaticamente
MAX_PARALLEL_JOBS="2"                     # Número máximo de jobs em paralelo

# 📁 Diretórios do Sistema
CONFIG_DIR="$HOME/.config/pdf-tools"      # Diretório de configuração
MODULES_DIR="$CONFIG_DIR/modules"          # Diretório de módulos
LOG_DIR="$CONFIG_DIR/logs"                 # Diretório de logs
TEMP_DIR="$CONFIG_DIR/temp"                 # Diretório temporário
CACHE_DIR="$CONFIG_DIR/cache"               # Diretório de cache
PRESETS_DIR="$CONFIG_DIR/presets"           # Diretório de presets salvos

# 🎨 Interface
THEME="default"                            # Tema da interface (default/dark/light)
SHOW_PREVIEW="true"                         # Mostrar preview de arquivos
COLOR_ENABLED="true"                        # Usar cores na interface
PROGRESS_BAR_STYLE="simple"                  # Estilo da barra de progresso

# 🔧 Ferramentas Padrão
PREFER_PANDOC="true"                        # Preferir pandoc para conversões
PREFER_LIBREOFFICE="false"                   # Preferir LibreOffice para conversões
OCR_ENGINE="tesseract"                       # Motor OCR (tesseract/ocrmypdf)
PDF_ENGINE="poppler"                          # Motor PDF (poppler/qpdf/pdftk)

# 📊 Qualidade Padrão
OCR_QUALITY="high"                           # Qualidade OCR (low/medium/high)
IMAGE_DPI="300"                               # DPI para imagens extraídas
COMPRESSION_LEVEL="medium"                     # Nível de compressão (low/medium/high)
JPEG_QUALITY="90"                              # Qualidade JPEG (1-100)

# 🔍 Opções de OCR Padrão
OCR_DESKEW="true"                              # Corrigir inclinação
OCR_CLEAN="true"                                # Limpar ruídos
OCR_REMOVE_BACKGROUND="false"                    # Remover fundo
OCR_OVERSAMPLE="false"                            # Oversampling
OCR_FORCE="false"                                  # Forçar OCR mesmo com texto

# 📝 Opções de Extração
EXTRACT_PRESERVE_LAYOUT="true"                    # Preservar layout em extrações
EXTRACT_TABLES="false"                              # Tentar extrair tabelas
EXTRACT_IMAGES="true"                                # Extrair imagens
EXTRACT_METADATA="true"                               # Extrair metadados

# 🌐 Rede e Cloud
ENABLE_CLOUD_SYNC="false"                            # Sincronizar com cloud
CLOUD_PROVIDER=""                                     # google/dropbox/nextcloud
CLOUD_FOLDER="/PDF_Tools"                              # Pasta na cloud
AUTO_UPLOAD="false"                                      # Upload automático

# 📅 Histórico e Logs
MAX_LOG_SIZE="10M"                                      # Tamanho máximo do log
MAX_LOG_FILES="5"                                        # Número máximo de logs
LOG_RETENTION_DAYS="30"                                   # Dias para manter logs
HISTORY_ENABLED="true"                                     # Habilitar histórico
HISTORY_FILE="$LOG_DIR/operations.log"                      # Arquivo de histórico

# 🔒 Segurança
ENCRYPT_TEMP="false"                                       # Criptografar temporários
SECURE_DELETE="false"                                        # Deleção segura
DEFAULT_PDF_PASSWORD=""                                      # Senha padrão (vazio = não usar)

# ⚡ Performance
USE_CACHE="true"                                             # Usar cache
CACHE_SIZE="100M"                                             # Tamanho do cache
PRELOAD_MODULES="false"                                        # Pré-carregar módulos
LAZY_LOAD="true"                                                # Carregar módulos sob demanda

# 🎯 Presets
CURRENT_PRESET="default"                                       # Preset atual
AUTO_LOAD_PRESET="false"                                        # Carregar preset automaticamente

# 📌 Bookmarks (últimos arquivos usados)
declare -a RECENT_FILES=()

# 📋 Últimas configurações usadas
LAST_OCR_MODE="basic"                                          # Último modo OCR usado
LAST_CONVERSION_FORMAT="txt"                                    # Último formato de conversão
LAST_BATCH_MODE="simple"                                        # Último modo batch usado
