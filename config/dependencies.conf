# PDF Tools TUI - Configuração de Dependências
# Lista de todas as ferramentas necessárias e opcionais

# ⚡ Ferramentas Essenciais (instaladas sempre)
ESSENTIAL=(
    "ocrmypdf:ocrmypdf:OCR principal"
    "tesseract:tesseract:Motor OCR"
    "pdfinfo:poppler-utils:Informações do PDF"
    "pdftotext:poppler-utils:Extração de texto"
    "convert:ImageMagick:Processamento de imagens"
)

# 🔧 Ferramentas de Conversão
CONVERSION=(
    "pandoc:pandoc:Conversão entre formatos"
    "libreoffice:libreoffice:Conversão office"
    "gs:ghostscript:Processamento PDF"
    "wkhtmltopdf:wkhtmltopdf:HTML para PDF"
)

# 📝 Ferramentas de OCR e Texto
OCR_TOOLS=(
    "tesseract-por:tesseract-langpack-por:Idioma português"
    "tesseract-eng:tesseract-langpack-eng:Idioma inglês"
    "tesseract-spa:tesseract-langpack-spa:Idioma espanhol"
    "unpaper:unpaper:Melhoria de imagens"
)

# 🖼️ Ferramentas de Imagem
IMAGE_TOOLS=(
    "pdfimages:poppler-utils:Extrair imagens"
    "pdftoppm:poppler-utils:PDF para imagens"
    "img2pdf:img2pdf:Imagens para PDF"
)

# 📊 Ferramentas de Formulários
FORM_TOOLS=(
    "commonforms:commonforms:Detecção de campos"
    "pdfcpu:pdfcpu:Manipulação de formulários"
)

# 🔐 Ferramentas de Segurança
SECURITY_TOOLS=(
    "pdftk:pdftk:Proteção e edição"
    "qpdf:qpdf:Manipulação PDF"
)

# 🎯 Ferramentas Especiais
SPECIAL_TOOLS=(
    "pdf2htmlEX:pdf2htmlEX:PDF para HTML"
    "pdfgrep:pdfgrep:Busca em PDFs"
    "fzf:fzf:Seleção interativa"
    "dialog:dialog:Interface TUI"
    "parallel:parallel:Processamento paralelo"
)

# 📦 Pacotes Python
PYTHON_PACKAGES=(
    "commonforms:commonforms:Detecção de campos"
    "pdf2image:pdf2image:PDF para imagem"
    "pytesseract:pytesseract:Interface Tesseract"
    "tabula-py:tabula-py:Extrair tabelas"
    "camelot-py:camelot-py:Tabelas avançadas"
    "pdfplumber:pdfplumber:Extração de dados"
    "PyPDF2:PyPDF2:Manipulação PDF"
    "reportlab:reportlab:Criação de PDF"
)

